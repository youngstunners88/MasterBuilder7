# GitHub Actions Workflow for Google Play Deployment
# 
# This workflow automatically deploys your Android app to Google Play Store
# when you push to specific branches or create releases.
#
# Setup:
# 1. Add your service account JSON as a GitHub Secret named GOOGLE_PLAY_SERVICE_ACCOUNT
# 2. Update the package name below
# 3. Customize the track and conditions as needed

name: Deploy to Google Play

on:
  # Deploy on push to main/master (internal track)
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - 'app/**'
      - 'pubspec.yaml'  # Flutter
      - 'build.gradle'  # Android
      
  # Deploy on release creation (production track)
  release:
    types: [published]
    
  # Manual trigger with track selection
  workflow_dispatch:
    inputs:
      track:
        description: 'Deployment track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      aab_path:
        description: 'Path to AAB file (optional, will auto-detect if not provided)'
        required: false
        default: ''

env:
  GOOGLE_PLAY_PACKAGE_NAME: ${{ vars.GOOGLE_PLAY_PACKAGE_NAME }}
  PYTHON_VERSION: '3.11'

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}" ]; then
            echo "❌ Error: GOOGLE_PLAY_SERVICE_ACCOUNT secret not set"
            echo "Please add your service account JSON as a GitHub secret"
            exit 1
          fi
          
          if [ -z "${{ vars.GOOGLE_PLAY_PACKAGE_NAME }}" ]; then
            echo "❌ Error: GOOGLE_PLAY_PACKAGE_NAME variable not set"
            echo "Please add your package name as a GitHub variable"
            exit 1
          fi
          
          echo "✅ All required secrets and variables are set"

  build:
    name: Build AAB
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      # Flutter build
      - name: Setup Flutter
        if: hashFiles('pubspec.yaml') != ''
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build Flutter AAB
        if: hashFiles('pubspec.yaml') != ''
        run: flutter build appbundle --release
        
      # React Native build
      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Build React Native AAB
        if: hashFiles('package.json') != ''
        run: |
          npm install
          cd android && ./gradlew bundleRelease
          
      # Native Android build
      - name: Setup Java
        if: hashFiles('build.gradle') != '' || hashFiles('app/build.gradle') != ''
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build Native Android AAB
        if: hashFiles('build.gradle') != '' || hashFiles('app/build.gradle') != ''
        run: ./gradlew bundleRelease
        
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: |
            build/app/outputs/bundle/release/*.aab
            android/app/build/outputs/bundle/release/*.aab
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to Google Play
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib pyyaml
          
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
          path: ./artifacts
          
      - name: Find AAB file
        id: find-aab
        run: |
          AAB_FILE=$(find ./artifacts -name "*.aab" | head -1)
          if [ -z "$AAB_FILE" ]; then
            echo "❌ No AAB file found"
            exit 1
          fi
          echo "aab_path=$AAB_FILE" >> $GITHUB_OUTPUT
          echo "Found AAB: $AAB_FILE"
          
      - name: Determine track
        id: determine-track
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TRACK="${{ github.event.inputs.track }}"
          elif [ "${{ github.event_name }}" == "release" ]; then
            TRACK="production"
          else
            TRACK="internal"
          fi
          echo "track=$TRACK" >> $GITHUB_OUTPUT
          echo "Deploying to: $TRACK"
          
      - name: Setup deployment script
        run: |
          # Download or use local deployment script
          if [ -f "google_play_deployment.py" ]; then
            echo "Using local deployment script"
          else
            echo "Downloading deployment script..."
            curl -fsSL https://raw.githubusercontent.com/youngstunners88/MasterBuilder7/main/google_play_deployment.py -o google_play_deployment.py
          fi
          
      - name: Validate AAB
        run: |
          export GOOGLE_PLAY_SERVICE_ACCOUNT_JSON='${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}'
          export GOOGLE_PLAY_PACKAGE_NAME='${{ vars.GOOGLE_PLAY_PACKAGE_NAME }}'
          
          python google_play_deployment.py validate "${{ steps.find-aab.outputs.aab_path }}"
          
      - name: Deploy to Google Play
        id: deploy
        run: |
          export GOOGLE_PLAY_SERVICE_ACCOUNT_JSON='${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}'
          export GOOGLE_PLAY_PACKAGE_NAME='${{ vars.GOOGLE_PLAY_PACKAGE_NAME }}'
          
          # Get release name from tag or commit
          if [ "${{ github.event_name }}" == "release" ]; then
            RELEASE_NAME="${{ github.event.release.name }}"
            RELEASE_NOTES="${{ github.event.release.body }}"
          else
            RELEASE_NAME="Build ${{ github.sha }}"
            RELEASE_NOTES="Automated deployment from ${{ github.ref_name }}"
          fi
          
          python google_play_deployment.py deploy \
            "${{ steps.find-aab.outputs.aab_path }}" \
            "${{ steps.determine-track.outputs.track }}" \
            "$RELEASE_NAME" \
            "$RELEASE_NOTES"
            
      - name: Post to Slack
        if: success() && vars.SLACK_WEBHOOK_URL
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "🚀 App deployed to Google Play!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *Deployment Successful*\n\n*Track:* ${{ steps.determine-track.outputs.track }}\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref_name }}"
                  }
                }
              ]
            }' \
            ${{ vars.SLACK_WEBHOOK_URL }}
            
      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "${{ vars.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "text": "❌ Google Play deployment failed!\n\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref_name }}\n\nCheck the workflow logs for details."
              }' \
              ${{ vars.SLACK_WEBHOOK_URL }}
          fi
