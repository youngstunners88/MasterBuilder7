# =============================================================================
# Security Scan Workflow
# =============================================================================
# Triggers: Schedule (daily), manual dispatch, PRs to main
# Purpose: Run comprehensive security audits and vulnerability scans
# =============================================================================

name: 🔒 Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - dependencies-only
          - code-only
          - containers-only
          - secrets-only
      severity_threshold:
        description: 'Minimum severity to report'
        required: false
        default: 'HIGH'
        type: choice
        options:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW

env:
  PYTHON_VERSION: '3.11'
  SEVERITY_THRESHOLD: ${{ github.event.inputs.severity_threshold || 'HIGH' }}

concurrency:
  group: security-scan-${{ github.event.inputs.scan_type || 'scheduled' }}
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Secret Detection
  # ==========================================================================
  detect-secrets:
    name: 🔑 Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'secrets-only' || github.event.inputs.scan_type == ''
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: 🔍 Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: 📝 Custom secret patterns check
        run: |
          # Check for common secret patterns
          PATTERNS=(
            'api[_-]?key.*[=:].*[a-zA-Z0-9]{32,}'
            'password.*[=:].*[^\s]{8,}'
            'secret.*[=:].*[a-zA-Z0-9]{16,}'
            'token.*[=:].*[a-zA-Z0-9]{20,}'
            'sk-[a-zA-Z0-9]{48}'
            'AKIA[0-9A-Z]{16}'
          )
          
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -riE "$pattern" --include="*.py" --include="*.yml" --include="*.yaml" --include="*.json" --include="*.env*" . 2>/dev/null | grep -v ".github/workflows" | head -20; then
              FOUND=1
            fi
          done
          
          if [[ $FOUND -eq 1 ]]; then
            echo "⚠️ Potential secrets detected - review above"
          fi

  # ==========================================================================
  # Dependency Vulnerability Scan
  # ==========================================================================
  scan-dependencies:
    name: 📦 Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'dependencies-only' || github.event.inputs.scan_type == ''
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Safety
        run: |
          pip install safety

      - name: 🔒 Run Safety check
        run: |
          safety check -r apex/requirements.txt --full-report --json > safety-report.json || true
          safety check -r apex/requirements.txt --full-report || true

      - name: 📤 Upload Safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json
          retention-days: 90

      - name: 🔍 Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r apex/requirements.txt --format=json --output=pip-audit-report.json || true
          pip-audit -r apex/requirements.txt || true

      - name: 📤 Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 90

      - name: 📊 OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'MasterBuilder7'
          path: '.'
          format: 'ALL'
          args: >
            --enableExperimental
            --failOnCVSS ${{ env.SEVERITY_THRESHOLD == 'CRITICAL' && '9' || env.SEVERITY_THRESHOLD == 'HIGH' && '7' || env.SEVERITY_THRESHOLD == 'MEDIUM' && '4' || '0' }}

      - name: 📤 Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 90

  # ==========================================================================
  # Static Application Security Testing (SAST)
  # ==========================================================================
  sast:
    name: 🔍 SAST Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'code-only' || github.event.inputs.scan_type == ''
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🔒 Run Bandit
        run: |
          pip install bandit[toml]
          bandit -r apex/ -f json -o bandit-report.json -ll || true
          bandit -r apex/ -ll -ii

      - name: 📤 Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 90

      - name: 🔍 Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/python
            p/python-flask
            p/python-sqlalchemy
          generateSarif: "1"

      - name: 📤 Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-results.sarif
          retention-days: 90

      - name: 🔍 Run Pylint Security
        run: |
          pip install pylint pylint-security
          pylint --load-plugins=pylint_security apex/ || true

      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: 🔧 Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ==========================================================================
  # Container Security Scan
  # ==========================================================================
  scan-containers:
    name: 🐳 Container Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'containers-only'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Build image for scanning
        run: |
          if [ -f "Dockerfile" ]; then
            docker build -t masterbuilder7:scan .
          elif [ -f "apex/infrastructure/docker/Dockerfile" ]; then
            docker build -f apex/infrastructure/docker/Dockerfile -t masterbuilder7:scan .
          else
            echo "No Dockerfile found"
            exit 0
          fi

      - name: 🔒 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'masterbuilder7:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: ${{ env.SEVERITY_THRESHOLD }}
          exit-code: '0'

      - name: 📤 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 🔒 Run Trivy in table format
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'masterbuilder7:scan'
          format: 'table'
          severity: ${{ env.SEVERITY_THRESHOLD }}
          exit-code: '0'

      - name: 🔍 Run Snyk container scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: masterbuilder7:scan
          args: --severity-threshold=${{ env.SEVERITY_THRESHOLD == 'CRITICAL' && 'critical' || env.SEVERITY_THRESHOLD == 'HIGH' && 'high' || 'medium' }}

  # ==========================================================================
  # Infrastructure as Code Scan
  # ==========================================================================
  scan-iac:
    name: 🏗️ Infrastructure as Code Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'code-only'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,kubernetes,github_actions
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: 📤 Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov-results.sarif
          retention-days: 90

      - name: 🔍 Run KICS
        uses: checkmarx/kics-github-action@master
        with:
          path: '.'
          output_formats: 'json,sarif'
          output_path: 'kics-results'
          ignore_on_exit: results

      - name: 📤 Upload KICS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kics-report
          path: kics-results/
          retention-days: 90

  # ==========================================================================
  # License Compliance
  # ==========================================================================
  license-check:
    name: 📜 License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.scan_type == 'full'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📜 Check licenses
        run: |
          pip install pip-licenses
          pip install -r apex/requirements.txt
          pip-licenses --format=json --output-file=licenses.json || true
          pip-licenses --format=markdown --output-file=licenses.md || true
          cat licenses.md

      - name: 📤 Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.*
          retention-days: 90

  # ==========================================================================
  # Generate Security Report
  # ==========================================================================
  security-report:
    name: 📊 Security Report
    runs-on: ubuntu-latest
    needs: [detect-secrets, scan-dependencies, sast, scan-containers, scan-iac]
    if: always()
    
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-reports/

      - name: 📊 Generate summary report
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Type:** ${{ github.event.inputs.scan_type || 'scheduled' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Severity Threshold:** ${{ env.SEVERITY_THRESHOLD }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.detect-secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.scan-dependencies.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scan | ${{ needs.scan-containers.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IaC Scan | ${{ needs.scan-iac.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All reports available as artifacts." >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-complete
          path: security-reports/
          retention-days: 90

      - name: 🔔 Notify on Critical Findings
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "🚨 Security scan found critical issues",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 Security Scan Alert"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Critical security issues detected in ${{ github.repository }}. Please review the scan results."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_SECURITY_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
