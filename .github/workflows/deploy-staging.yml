# =============================================================================
# Deploy to Staging Workflow
# =============================================================================
# Triggers: Successful build on develop branch, manual dispatch
# Purpose: Deploy application to staging environment for testing
# =============================================================================

name: 🚀 Deploy to Staging

on:
  workflow_run:
    workflows: ["🏗️ Build & Package"]
    branches: [develop]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        type: string
      skip_tests:
        description: 'Skip smoke tests'
        required: false
        default: false
        type: boolean

env:
  ENVIRONMENT: staging
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  KUBE_NAMESPACE: masterbuilder7-staging
  HELM_RELEASE: masterbuilder7-staging

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Pre-deployment Checks
  # ==========================================================================
  pre-deploy:
    name: ✅ Pre-deployment Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🏷️ Determine version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="develop-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: 🔍 Verify image exists
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/masterbuilder7:${{ steps.version.outputs.version }}"
          echo "Checking image: $IMAGE"
          # Use crane or docker manifest inspect to verify image exists
          docker manifest inspect $IMAGE || echo "Warning: Image may not exist yet"

      - name: 🔐 Verify secrets
        run: |
          REQUIRED_SECRETS=("KUBE_CONFIG_STAGING" "DATABASE_URL_STAGING")
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [[ -z "${{ secrets[secret] }}" ]]; then
              echo "❌ Missing secret: $secret"
              exit 1
            fi
          done
          echo "✅ All required secrets present"

  # ==========================================================================
  # Database Migrations
  # ==========================================================================
  migrate-db:
    name: 🗄️ Database Migrations
    runs-on: ubuntu-latest
    needs: pre-deploy
    timeout-minutes: 15
    environment: staging
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install alembic asyncpg psycopg2-binary
          pip install -r apex/requirements.txt

      - name: 🗄️ Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          cd apex
          alembic upgrade head || echo "No migrations to run"

      - name: ✅ Verify database connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          python -c "
          import asyncio
          import asyncpg
          async def test():
              conn = await asyncpg.connect('${{ secrets.DATABASE_URL_STAGING }}')
              result = await conn.fetchval('SELECT 1')
              print(f'Database connection: OK (result={result})')
              await conn.close()
          asyncio.run(test())
          "

  # ==========================================================================
  # Deploy to Kubernetes
  # ==========================================================================
  deploy-k8s:
    name: ☸️ Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [pre-deploy, migrate-db]
    timeout-minutes: 20
    environment: staging
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Setup Kubernetes
        uses: azure/setup-kubectl@v3

      - name: 🔐 Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
          kubectl config current-context
          kubectl get nodes

      - name: 📋 Update deployment image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/masterbuilder7:${{ needs.pre-deploy.outputs.version }}"
          
          # Update main deployment
          kubectl set image deployment/masterbuilder7 \
            app=$IMAGE \
            -n ${{ env.KUBE_NAMESPACE }} \
            --record
          
          # Update agent deployments if they exist
          for agent in meta-router planning-agent frontend-agent backend-agent; do
            kubectl set image deployment/agent-$agent \
              agent=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/agent-$agent:${{ needs.pre-deploy.outputs.version }} \
              -n ${{ env.KUBE_NAMESPACE }} \
              --record 2>/dev/null || echo "Agent $agent not deployed"
          done

      - name: ⏳ Wait for rollout
        run: |
          kubectl rollout status deployment/masterbuilder7 \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=300s

      - name: 🔄 Verify deployment
        run: |
          kubectl get pods -n ${{ env.KUBE_NAMESPACE }}
          kubectl get svc -n ${{ env.KUBE_NAMESPACE }}

  # ==========================================================================
  # Deploy with Helm
  # ==========================================================================
  deploy-helm:
    name: ⎈ Deploy with Helm
    runs-on: ubuntu-latest
    needs: [pre-deploy, migrate-db]
    timeout-minutes: 15
    environment: staging
    if: false  # Enable when Helm charts are ready
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⎈ Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'

      - name: 🔐 Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: ⎈ Deploy/Upgrade Helm release
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/masterbuilder7 \
            --namespace ${{ env.KUBE_NAMESPACE }} \
            --create-namespace \
            --set image.tag=${{ needs.pre-deploy.outputs.version }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/masterbuilder7 \
            --set environment=staging \
            --values helm/values-staging.yaml \
            --wait \
            --timeout 10m

      - name: 📊 Get Helm status
        run: |
          helm status ${{ env.HELM_RELEASE }} -n ${{ env.KUBE_NAMESPACE }}
          helm get values ${{ env.HELM_RELEASE }} -n ${{ env.KUBE_NAMESPACE }}

  # ==========================================================================
  # Smoke Tests
  # ==========================================================================
  smoke-tests:
    name: 🧪 Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-k8s]
    timeout-minutes: 10
    if: github.event.inputs.skip_tests != 'true'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install test dependencies
        run: |
          pip install requests httpx pytest

      - name: 🧪 Run smoke tests
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
        run: |
          python -c "
          import requests
          import sys
          import time
          
          base_url = '$BASE_URL' or 'https://staging.masterbuilder7.io'
          max_retries = 10
          
          for i in range(max_retries):
              try:
                  # Health check
                  resp = requests.get(f'{base_url}/health', timeout=30)
                  print(f'Health check: {resp.status_code}')
                  if resp.status_code == 200:
                      data = resp.json()
                      print(f'Health status: {data}')
                      break
              except Exception as e:
                  print(f'Attempt {i+1}/{max_retries} failed: {e}')
                  if i == max_retries - 1:
                      sys.exit(1)
                  time.sleep(10)
          
          # API tests
          endpoints = ['/api/v1/health', '/api/v1/status']
          for endpoint in endpoints:
              try:
                  resp = requests.get(f'{base_url}{endpoint}', timeout=10)
                  print(f'{endpoint}: {resp.status_code}')
              except Exception as e:
                  print(f'{endpoint}: ERROR - {e}')
          
          print('✅ Smoke tests passed')
          "

      - name: 🔗 Test Agent Endpoints
        run: |
          python -c "
          import requests
          import sys
          
          base_url = '${{ secrets.STAGING_URL }}' or 'https://staging.masterbuilder7.io'
          
          # Test agent health endpoints
          agents = ['meta-router', 'planning-agent', 'frontend-agent', 'backend-agent']
          for agent in agents:
              try:
                  resp = requests.get(f'{base_url}/api/v1/agents/{agent}/health', timeout=5)
                  print(f'Agent {agent}: {resp.status_code}')
              except Exception as e:
                  print(f'Agent {agent}: Not available - {e}')
          "

  # ==========================================================================
  # Notify Deployment
  # ==========================================================================
  notify:
    name: 📢 Notify Deployment
    runs-on: ubuntu-latest
    needs: [pre-deploy, deploy-k8s, smoke-tests]
    if: always()
    
    steps:
      - name: 📊 Create Deployment Summary
        run: |
          echo "## 🚀 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.pre-deploy.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** staging" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.deploy-k8s.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-deploy checks | ${{ needs.pre-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database migration | ${{ needs.migrate-db.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kubernetes deploy | ${{ needs.deploy-k8s.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://staging.masterbuilder7.io" >> $GITHUB_STEP_SUMMARY

      - name: 🔔 Slack Notification
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ needs.deploy-k8s.result == 'success' && '✅' || '❌' }} Staging Deployment ${{ needs.deploy-k8s.result }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ needs.deploy-k8s.result == 'success' && '✅' || '❌' }} Staging Deployment ${{ needs.deploy-k8s.result }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ needs.pre-deploy.outputs.version }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "🌐 Visit Staging"
                      },
                      "url": "https://staging.masterbuilder7.io"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "📊 View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: 🐛 Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Staging deployment failed: ${{ needs.pre-deploy.outputs.version }}`,
              body: `Deployment to staging failed for version \`${{ needs.pre-deploy.outputs.version }}\`.\n\n[View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              labels: ['deployment', 'staging', 'failed']
            })
