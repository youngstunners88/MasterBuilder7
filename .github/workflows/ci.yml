# =============================================================================
# CI Workflow - Continuous Integration
# =============================================================================
# Triggers: Pull requests, pushes to main/develop branches
# Purpose: Run tests, linting, type checking, and code quality checks
# =============================================================================

name: 🔍 Continuous Integration

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        default: '3.11'
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'

env:
  PYTHON_VERSION: ${{ github.event.inputs.python-version || '3.11' }}
  POETRY_VERSION: '1.7.1'
  UV_VERSION: '0.1.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Code Quality Checks
  # ==========================================================================
  lint-and-format:
    name: 🎨 Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.1.1 isort==5.13.2 flake8==7.0.0

      - name: 🎨 Check code formatting (Black)
        run: |
          black --check --diff --line-length 100 .
        continue-on-error: true

      - name: 📊 Check import sorting (isort)
        run: |
          isort --check-only --diff --profile black --line-length 100 .
        continue-on-error: true

      - name: 🔍 Run Flake8 linting
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: 📝 Comment PR with lint results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Code formatting issues detected**\n\nPlease run:\n```bash\nblack --line-length 100 .\nisort --profile black --line-length 100 .\n```'
            })

  # ==========================================================================
  # Type Checking
  # ==========================================================================
  type-check:
    name: 🔎 Type Checking (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mypy-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-mypy-

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy==1.8.0 types-PyYAML types-requests
          pip install -r apex/requirements.txt

      - name: 🔎 Run mypy type checking
        run: |
          mypy apex/ --ignore-missing-imports --show-error-codes \
            --disable-error-code attr-defined \
            --disable-error-code name-defined \
            --disable-error-code import-untyped
        continue-on-error: true

  # ==========================================================================
  # Security Checks
  # ==========================================================================
  security-check:
    name: 🔒 Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🔒 Run Bandit security scan
        run: |
          pip install bandit[toml]==1.7.7
          bandit -r apex/ -f json -o bandit-report.json || true
          bandit -r apex/ -ll || true

      - name: 📤 Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

      - name: 🛡️ Check for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ==========================================================================
  # Run Tests
  # ==========================================================================
  test:
    name: 🧪 Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: masterbuilder7_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/masterbuilder7_test
      REDIS_URL: redis://localhost:6379/0
      PYTHONPATH: ${{ github.workspace }}
      ENVIRONMENT: test

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-xdist
          pip install -r apex/requirements.txt

      - name: 🧪 Run tests with coverage
        run: |
          pytest skills/ -v --cov=apex --cov-report=xml --cov-report=term-missing \
            -n auto --tb=short || true
          pytest apex/ -v --cov=apex --cov-append --cov-report=xml --cov-report=term-missing \
            -n auto --tb=short || true

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            pytest-report.xml
            coverage.xml
          retention-days: 30

  # ==========================================================================
  # Build Verification
  # ==========================================================================
  build-check:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-format, type-check]
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: 🏗️ Build Python package
        run: |
          python -m build --wheel
        continue-on-error: true

      - name: 🐳 Verify Docker build
        run: |
          if [ -f "Dockerfile" ]; then
            docker build -t masterbuilder7:test --target builder .
          elif [ -f "apex/infrastructure/docker/docker-compose.yml" ]; then
            echo "Docker compose exists - skipping docker build test"
          else
            echo "No Dockerfile found - skipping docker build"
          fi
        continue-on-error: true

  # ==========================================================================
  # Notify Results
  # ==========================================================================
  notify:
    name: 📢 Notify Results
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check, security-check, test, build-check]
    if: always()
    
    steps:
      - name: 📊 Summarize Results
        run: |
          echo "## CI Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint-and-format.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Check | ${{ needs.security-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Check | ${{ needs.build-check.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: 🔔 Slack Notification (on failure)
        if: failure() && github.ref == 'refs/heads/main'
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "❌ CI Failed for ${{ github.repository }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ CI Pipeline Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
