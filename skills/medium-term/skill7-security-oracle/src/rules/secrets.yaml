rules:
  - id: hardcoded-aws-access-key
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - ruby
    message: |
      Hardcoded AWS access key detected. Move to environment variables.
    severity: ERROR
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH
    pattern-regex: AKIA[0-9A-Z]{16}

  - id: hardcoded-api-key-variable
    languages:
      - python
    message: |
      Hardcoded API key detected. Use environment variables instead.
    severity: ERROR
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
    patterns:
      - pattern-either:
          - pattern: $VAR = "..."
          - pattern: $VAR = '...'
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(api_key|apikey|api_secret|secret_key|auth_token)
      - metavariable-regex:
          metavariable: "..."
          regex: ^[a-zA-Z0-9_-]{16,}$

  - id: hardcoded-password-variable
    languages:
      - python
      - javascript
      - typescript
    message: |
      Hardcoded password detected. Move to environment variables or secure vault.
    severity: ERROR
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
    patterns:
      - pattern-either:
          - pattern: $VAR = "..."
          - pattern: $VAR = '...'
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret)
      - metavariable-regex:
          metavariable: "..."
          regex: ^[^\s"']{8,}$

  - id: private-key-in-code
    languages:
      - python
      - javascript
      - typescript
      - go
      - ruby
      - java
    message: |
      Private key detected in code. Never commit private keys!
      Use environment variables or secure key management.
    severity: CRITICAL
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
    pattern-regex: "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"

  - id: jwt-secret-hardcoded
    languages:
      - python
      - javascript
      - typescript
    message: |
      Hardcoded JWT secret detected. Use environment variables.
    severity: ERROR
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
    patterns:
      - pattern-either:
          - pattern: jwt.encode(..., "...", ...)
          - pattern: jwt.decode(..., "...", ...)
          - pattern: JWT_SECRET = "..."
          - pattern: SECRET_KEY = "..."