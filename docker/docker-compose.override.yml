# =============================================================================
# MasterBuilder7 - Local Development Overrides
# Use with: docker-compose -f docker-compose.yml -f docker-compose.override.yml up
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # MCP Server - Development Mode
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      target: development
    ports:
      - "8080:8080"
      - "8000:8000"
      - "5678:5678"  # Debugpy port
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - PYTHONASYNCIODEBUG=1
      - PYDEVD_DISABLE_FILE_VALIDATION=1
    volumes:
      # Mount source code for hot reload
      - ../apex:/app/apex:ro
      - ../mcp_server.py:/app/mcp_server.py:ro
      - ../mcp_http_server.py:/app/mcp_http_server.py:ro
      - ../mcp_http_server_secure.py:/app/mcp_http_server_secure.py:ro
      - ../mcp_client.py:/app/mcp_client.py:ro
      # Writable directories
      - mb7-data:/app/data
      - mb7-logs:/app/logs
      - mb7-checkpoints:/app/checkpoints
    command: ["dev-server"]
    # Enable interactive debugging
    stdin_open: true
    tty: true

  # ---------------------------------------------------------------------------
  # Agent Workers - Development
  # ---------------------------------------------------------------------------
  agent-workers:
    build:
      target: production
    deploy:
      replicas: 1
    environment:
      - WORKER_CONCURRENCY=2
      - LOG_LEVEL=DEBUG
    volumes:
      - ../apex:/app/apex:ro
      - mb7-data:/app/data
      - mb7-logs:/app/logs

  # ---------------------------------------------------------------------------
  # Celery Worker - Development
  # ---------------------------------------------------------------------------
  celery-worker:
    deploy:
      replicas: 1
    environment:
      - CELERY_LOG_LEVEL=DEBUG
    volumes:
      - ../apex:/app/apex:ro

  # ---------------------------------------------------------------------------
  # PostgreSQL - Development with exposed ports
  # ---------------------------------------------------------------------------
  postgres:
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=devpassword
    # Development-friendly config
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "log_destination=stderr"

  # ---------------------------------------------------------------------------
  # Redis - Development with exposed ports
  # ---------------------------------------------------------------------------
  redis:
    ports:
      - "6379:6379"
    # No persistence in development for faster restarts
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  # ---------------------------------------------------------------------------
  # Flower - Development (no auth required)
  # ---------------------------------------------------------------------------
  flower:
    environment:
      - FLOWER_BASIC_AUTH=
      - FLOWER_URL_PREFIX=/flower

  # ---------------------------------------------------------------------------
  # Grafana - Development
  # ---------------------------------------------------------------------------
  grafana:
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer

  # ---------------------------------------------------------------------------
  # Nginx - Development (simplified config)
  # ---------------------------------------------------------------------------
  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
