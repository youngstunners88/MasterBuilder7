# =============================================================================
# MasterBuilder7 - Prometheus Production Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'masterbuilder7-prod'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s
      api_version: v2

# Load rules
rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/rules/alerts/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # MCP Server - Load balanced
  - job_name: 'mcp-server'
    static_configs:
      - targets:
          - 'mcp-server:9090'
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true

  # Agent Workers
  - job_name: 'agent-workers'
    dns_sd_configs:
      - names: ['agent-workers']
        type: 'A'
        port: 9090
    metrics_path: /metrics
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Celery Workers
  - job_name: 'celery-workers'
    static_configs:
      - targets: ['celery-worker:9090']
    metrics_path: /metrics
    scrape_interval: 15s

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # Node Exporter
  - job_name: 'node'
    dns_sd_configs:
      - names: ['node-exporter']
        type: 'A'
        port: 9100
    scrape_interval: 30s

  # cAdvisor
  - job_name: 'cadvisor'
    dns_sd_configs:
      - names: ['cadvisor']
        type: 'A'
        port: 8080
    scrape_interval: 30s

  # Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
    scrape_interval: 30s

  # Blackbox exporter (for external monitoring)
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://mcp-server:8080/health
          - http://nginx/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
