apiVersion: v1
kind: Service
metadata:
  name: mb7-mcp-server
  namespace: mb7
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: masterbuilder7
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours - for SSE connections
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: api
  publishNotReadyAddresses: false
---
apiVersion: v1
kind: Service
metadata:
  name: mb7-agent-worker
  namespace: mb7
  labels:
    app.kubernetes.io/name: agent-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: masterbuilder7
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet-like discovery
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app.kubernetes.io/name: agent-worker
    app.kubernetes.io/component: worker
---
apiVersion: v1
kind: Service
metadata:
  name: mb7-build-worker
  namespace: mb7
  labels:
    app.kubernetes.io/name: build-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: masterbuilder7
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app.kubernetes.io/name: build-worker
    app.kubernetes.io/component: worker
---
apiVersion: v1
kind: Service
metadata:
  name: mb7-security-worker
  namespace: mb7
  labels:
    app.kubernetes.io/name: security-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: masterbuilder7
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app.kubernetes.io/name: security-worker
    app.kubernetes.io/component: worker
---
# ExternalName service for external dependencies (optional)
apiVersion: v1
kind: Service
metadata:
  name: mb7-external-redis
  namespace: mb7
  labels:
    app.kubernetes.io/name: external-redis
    app.kubernetes.io/component: external
type: ExternalName
externalName: redis.example.com  # Replace with actual external Redis endpoint
---
# EndpointSlice for fine-grained endpoint control (optional)
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: mb7-mcp-server-slice
  namespace: mb7
  labels:
    kubernetes.io/service-name: mb7-mcp-server
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 8000
  - name: metrics
    protocol: TCP
    port: 9090
endpoints: []
