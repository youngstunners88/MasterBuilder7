---
# Custom Metrics Configuration for External Metrics (Redis queue length)
# This requires the Prometheus Adapter or similar to expose Redis metrics to HPA
apiVersion: v1
kind: ConfigMap
metadata:
  name: mb7-custom-metrics-config
  namespace: mb7
  labels:
    app.kubernetes.io/name: custom-metrics
    app.kubernetes.io/component: hpa
data:
  # Example Prometheus Adapter configuration for Redis queue metrics
  # This would be applied to the prometheus-adapter deployment
  config.yaml: |
    rules:
    - seriesQuery: 'redis_key_size{namespace="mb7"}'
      resources:
        overrides:
          namespace:
            resource: namespace
      name:
        matches: "^(.*)_size"
        as: "${1}_length"
      metricsQuery: 'avg_over_time(<<.Series>>{<<.LabelMatchers>>}[5m])'
