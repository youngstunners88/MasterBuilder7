apiVersion: v1
kind: ServiceAccount
metadata:
  name: mb7-api-service-account
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: service-account
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mb7-worker-service-account
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: worker-service-account
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mb7-monitoring-service-account
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: monitoring-service-account
automountServiceAccountToken: true
---
# Role for API server to read ConfigMaps and Secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mb7-api-role
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: rbac
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
---
# Role for workers to update their own status
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mb7-worker-role
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: rbac
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
# Role for Prometheus monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mb7-monitoring-role
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: rbac
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
  verbs: ["get", "list", "watch"]
---
# RoleBindings
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mb7-api-rolebinding
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mb7-api-role
subjects:
- kind: ServiceAccount
  name: mb7-api-service-account
  namespace: mb7
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mb7-worker-rolebinding
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mb7-worker-role
subjects:
- kind: ServiceAccount
  name: mb7-worker-service-account
  namespace: mb7
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mb7-monitoring-rolebinding
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mb7-monitoring-role
subjects:
- kind: ServiceAccount
  name: mb7-monitoring-service-account
  namespace: mb7
---
# ClusterRole for reading nodes (required for some monitoring features)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mb7-node-reader
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: rbac
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "nodes/metrics"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mb7-monitoring-clusterrolebinding
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mb7-node-reader
subjects:
- kind: ServiceAccount
  name: mb7-monitoring-service-account
  namespace: mb7
---
# Network Policy - Deny all ingress/egress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mb7-default-deny-all
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Network Policy - Allow MCP server ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mb7-mcp-server-ingress
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-server
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx  # Allow from ingress controller
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: agent-worker  # Allow from workers
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: build-worker
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9090
---
# Network Policy - Allow database access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mb7-postgres-ingress
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: mcp-server
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: agent-worker
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: build-worker
    ports:
    - protocol: TCP
      port: 5432
---
# Network Policy - Allow Redis access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mb7-redis-ingress
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: mcp-server
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: agent-worker
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: build-worker
    ports:
    - protocol: TCP
      port: 6379
---
# Network Policy - Allow egress to external services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mb7-egress-allow
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: masterbuilder7
  policyTypes:
  - Egress
  egress:
  # Allow DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow internet egress (for API calls)
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  # Allow internal cluster communication
  - to:
    - namespaceSelector:
        matchLabels:
          name: mb7
---
# Pod Security Policy (deprecated in K8s 1.21+, use Pod Security Standards instead)
# For Kubernetes 1.25+, use the Pod Security admission controller
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: mb7-restricted
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: psp
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
  - ALL
  volumes:
  - 'configMap'
  - 'emptyDir'
  - 'projected'
  - 'secret'
  - 'downwardAPI'
  - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
  supplementalGroups:
    rule: 'RunAsAny'
  readOnlyRootFilesystem: true
