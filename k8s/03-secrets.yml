apiVersion: v1
kind: Secret
metadata:
  name: mb7-secrets
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: "mb7_admin"
  POSTGRES_PASSWORD: "change-me-in-production-strong-password"
  DATABASE_URL: "postgresql://mb7_admin:change-me-in-production-strong-password@mb7-postgres:5432/masterbuilder7?sslmode=require"
  
  # Redis Credentials
  REDIS_PASSWORD: "change-me-redis-strong-password"
  REDIS_URL: "redis://:change-me-redis-strong-password@mb7-redis:6379/0"
  
  # API Keys (placeholder - replace with actual keys)
  MCP_API_KEY: "mb7-api-key-change-in-production"
  MCP_SECRET_KEY: "mb7-secret-key-change-in-production-32-chars-long"
  
  # Encryption Keys
  ENCRYPTION_KEY: "change-me-32-byte-encryption-key"
  JWT_SECRET: "change-me-jwt-secret-key-at-least-32-chars"
  
  # External Service API Keys
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  PAYSTACK_SECRET_KEY: ""
  FIRECRAWL_API_KEY: ""
  APIFY_API_TOKEN: ""
  DWAVE_API_TOKEN: ""
  
  # Monitoring
  GLITCHTIP_DSN: ""
  POSTHOG_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: mb7-tls
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
# NOTE: Replace with actual certificate and key in production
# Use cert-manager or manually generate with:
# kubectl create secret tls mb7-tls --cert=path/to/cert.crt --key=path/to/key.key -n mb7
data:
  tls.crt: ""
  tls.key: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: mb7-docker-registry
  namespace: mb7
  labels:
    app.kubernetes.io/name: masterbuilder7
    app.kubernetes.io/component: registry
type: kubernetes.io/dockerconfigjson
# NOTE: Replace with actual Docker registry credentials
# Use: kubectl create secret docker-registry mb7-docker-registry \
#      --docker-server=registry.example.com \
#      --docker-username=username \
#      --docker-password=password \
#      --docker-email=email@example.com \
#      -n mb7
data:
  .dockerconfigjson: ""
