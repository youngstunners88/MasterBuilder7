# MasterBuilder7 - Loki Configuration
# Log aggregation for 8-agent build system

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info
  log_format: json

# Common configuration
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Schema configuration
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Storage configuration
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
    cache_ttl: 24h
  filesystem:
    directory: /loki/chunks

# Query configuration
query_range:
  align_queries_with_step: true
  max_retries: 5
  cache_results: true
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Limits configuration
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # 7 days
  retention_period: 720h  # 30 days
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 20MB
  max_global_streams_per_user: 5000
  max_chunks_per_query: 200000
  max_query_length: 721h
  max_query_parallelism: 32
  max_query_series: 500
  cardinality_limit: 100000
  max_label_value_length: 2048
  max_label_name_length: 1024

# Chunk store configuration
chunk_store_config:
  max_look_back_period: 720h

# Table manager configuration
table_manager:
  retention_deletes_enabled: true
  retention_period: 720h

# Ingester configuration
ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period: 1h
  chunk_retain_period: 30s
  max_transfer_retries: 0
  wal:
    enabled: true
    dir: /loki/wal
    replay_memory_ceiling: 1GB
  max_chunk_age: 2h
  chunk_target_size: 1572864
  chunk_encoding: snappy

# Querier configuration
querier:
  max_concurrent: 20
  query_ingesters_within: 2h

# Query scheduler configuration
query_scheduler:
  max_outstanding_requests_per_tenant: 32768
  grpc_client_config:
    max_send_msg_size: 104857600
    max_recv_msg_size: 104857600

# Frontend configuration
frontend:
  compress_responses: true
  max_outstanding_per_tenant: 4096
  log_queries_longer_than: 10s
  tail_proxy_url: ''
  grpc_client_config:
    max_send_msg_size: 104857600
    max_recv_msg_size: 104857600

frontend_worker:
  grpc_client_config:
    max_send_msg_size: 104857600
    max_recv_msg_size: 104857600

# Ruler configuration (for log-based alerts)
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true
  enable_alertmanager_v2: true

# Analytics (disable for privacy)
analytics:
  reporting_enabled: false

# Runtime configuration
runtime_config:
  file: /etc/loki/runtime-config.yaml
