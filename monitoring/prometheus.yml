# MasterBuilder7 - Prometheus Configuration
# Production-ready monitoring for 8-agent build system

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'masterbuilder7'
    replica: '{{.ExternalURL}}'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
      timeout: 10s
      api_version: v2

# Load alert rules
rule_files:
  - 'alerts.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    metrics_path: /metrics

  # MasterBuilder7 Core API
  - job_name: 'masterbuilder7-api'
    static_configs:
      - targets: ['api:8000', 'host.docker.internal:8000']
    scrape_interval: 15s
    metrics_path: /metrics
    health_check:
      - path: /health
        interval: 30s

  # Agent Metrics (8 Specialist Agents)
  - job_name: 'agent-metrics'
    static_configs:
      - targets: 
        - 'agent-meta-router:8001'
        - 'agent-planning:8002'
        - 'agent-frontend:8003'
        - 'agent-backend:8004'
        - 'agent-testing:8005'
        - 'agent-devops:8006'
        - 'agent-reliability:8007'
        - 'agent-evolution:8008'
        - 'host.docker.internal:8001-8008'
    scrape_interval: 10s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        regex: '.*-([a-z]+):.*|.*:800([1-8])'
        target_label: agent_type
        replacement: '${1}'
      - source_labels: [__address__]
        regex: '.*:8001'
        target_label: agent_name
        replacement: 'meta-router'
      - source_labels: [__address__]
        regex: '.*:8002'
        target_label: agent_name
        replacement: 'planning'
      - source_labels: [__address__]
        regex: '.*:8003'
        target_label: agent_name
        replacement: 'frontend'
      - source_labels: [__address__]
        regex: '.*:8004'
        target_label: agent_name
        replacement: 'backend'
      - source_labels: [__address__]
        regex: '.*:8005'
        target_label: agent_name
        replacement: 'testing'
      - source_labels: [__address__]
        regex: '.*:8006'
        target_label: agent_name
        replacement: 'devops'
      - source_labels: [__address__]
        regex: '.*:8007'
        target_label: agent_name
        replacement: 'reliability'
      - source_labels: [__address__]
        regex: '.*:8008'
        target_label: agent_name
        replacement: 'evolution'

  # Build Pipeline Metrics
  - job_name: 'build-pipeline'
    static_configs:
      - targets: ['pipeline:8009', 'host.docker.internal:8009']
    scrape_interval: 10s
    metrics_path: /metrics

  # Queue Metrics (Redis/RabbitMQ)
  - job_name: 'queue-metrics'
    static_configs:
      - targets: ['redis:6379', 'rabbitmq:15692']
    scrape_interval: 10s

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # cAdvisor (Container Metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # PostgreSQL Exporter (if using PostgreSQL)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # MongoDB Exporter (if using MongoDB)
  - job_name: 'mongodb-exporter'
    static_configs:
      - targets: ['mongodb-exporter:9216']
    scrape_interval: 30s

  # Blackbox Exporter (Endpoint Monitoring)
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://api:8000/health
        - http://dashboard:3000
        - http://apex:8010/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # OpenTelemetry Collector Metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    scrape_interval: 30s

  # Loki Metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    scrape_interval: 30s

  # Tempo Metrics
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
    scrape_interval: 30s

# Remote Write (for long-term storage like Thanos/Cortex)
# remote_write:
#   - url: http://thanos-receive:19291/api/v1/receive
#     queue_config:
#       max_samples_per_send: 1000
#       max_shards: 200
#       capacity: 2500

# Storage configuration
storage:
  tsdb:
    retention.time: 30d
    retention.size: 50GB
    wal-compression: true
