# Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'MasterBuilder7 Dashboards'
    orgId: 1
    folder: 'MasterBuilder7'
    folderUid: 'mb7-folder'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
