# Promtail Configuration - Log Collection for MasterBuilder7
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s
    backoff_config:
      min_period: 100ms
      max_period: 5s
      max_retries: 10

scrape_configs:
  # MasterBuilder7 Application Logs
  - job_name: masterbuilder7-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: masterbuilder7
          app: masterbuilder7
          __path__: /var/log/masterbuilder7/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: message
            timestamp: timestamp
            agent_name: agent_name
            build_id: build_id
            trace_id: trace_id
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          level:
          agent_name:
          build_id:
      - output:
          source: msg

  # Agent-specific Logs
  - job_name: agent-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: agents
          __path__: /var/log/agents/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: message
            agent_name: agent_name
            timestamp: timestamp
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          level:
          agent_name:
      - output:
          source: msg

  # Docker Container Logs
  - job_name: docker-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          source: attrs
          expressions:
            container_name: container_name
            image_name: image_name
            compose_service: compose_service
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
          container_name:
          image_name:
          compose_service:
      - output:
          source: output

  # System Logs
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<service>\S+):\s+(?P<message>.*)$'
      - timestamp:
          source: timestamp
          format: 'Jan 02 15:04:05'
      - labels:
          hostname:
          service:
      - output:
          source: message
