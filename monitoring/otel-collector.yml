# MasterBuilder7 - OpenTelemetry Collector Configuration
# Unified telemetry collection for 8-agent build system

receivers:
  # Prometheus metrics scraping
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 30s
          static_configs:
            - targets: ['0.0.0.0:8888']
        - job_name: 'agent-metrics'
          scrape_interval: 15s
          static_configs:
            - targets: 
              - 'host.docker.internal:8001'
              - 'host.docker.internal:8002'
              - 'host.docker.internal:8003'
              - 'host.docker.internal:8004'
              - 'host.docker.internal:8005'
              - 'host.docker.internal:8006'
              - 'host.docker.internal:8007'
              - 'host.docker.internal:8008'

  # OTLP receivers (from agents)
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 64
        max_concurrent_streams: 100
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins: ["*"]
          allowed_headers: ["*"]

  # Jaeger traces
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_binary:
        endpoint: 0.0.0.0:6832
      thrift_compact:
        endpoint: 0.0.0.0:6831
      thrift_http:
        endpoint: 0.0.0.0:14268

  # Zipkin traces
  zipkin:
    endpoint: 0.0.0.0:9411

  # File log receiver
  filelog:
    include:
      - /var/log/masterbuilder7/*.log
      - /var/log/agents/*.log
    exclude:
      - /var/log/masterbuilder7/*.gz
      - /var/log/masterbuilder7/*.tmp
    start_at: beginning
    multiline:
      line_start_pattern: '^\d{4}-\d{2}-\d{2}|^\[|\{'
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes.timestamp
          layout: '%Y-%m-%dT%H:%M:%S.%fZ'
      - type: severity_parser
        parse_from: attributes.level
        mapping:
          debug: debug
          info: info
          warning: warn
          error: error
          fatal: fatal
      - type: resource
        id: agent-name
        attributes:
          service.name: EXPR(attributes.agent_name || "masterbuilder7")
          service.version: EXPR(attributes.version || "unknown")

processors:
  # Batch processing for efficiency
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Memory limiter to prevent OOM
  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 5s

  # Resource enrichment
  resource:
    attributes:
      - key: cluster
        value: masterbuilder7
        action: upsert
      - key: environment
        value: production
        action: upsert
      - key: telemetry.sdk.name
        value: opentelemetry
        action: upsert
      - key: telemetry.sdk.language
        value: python
        action: upsert

  # Resource detection
  resourcedetection:
    detectors: [env, system, docker]
    timeout: 5s
    override: false

  # Attributes processing
  attributes:
    actions:
      - key: agent.type
        from_attribute: agent_name
        action: extract
        pattern: ^([a-z-]+)
      - key: build.id
        from_attribute: build_id
        action: upsert
      - key: build.status
        from_attribute: build_status
        action: upsert

  # Filter noisy metrics
  filter:
    metrics:
      exclude:
        match_type: strict
        metric_names:
          - scraper_duration_seconds
          - scraper_scraped_samples

  # Metric transformations
  metricstransform:
    transforms:
      - include: agent_cpu_usage
        match_type: strict
        action: update
        operations:
          - action: add_label
            new_label: unit
            new_value: percent
      - include: agent_memory_usage_bytes
        match_type: strict
        action: update
        operations:
          - action: add_label
            new_label: unit
            new_value: bytes

  # Tail-based sampling for traces
  tail_sampling:
    decision_wait: 10s
    num_traces: 100000
    expected_new_traces_per_sec: 1000
    policies:
      - name: errors
        type: status_code
        status_code: {status_codes: [ERROR]}
      - name: slow_requests
        type: latency
        latency: {threshold_ms: 1000}
      - name: important_agents
        type: string_attribute
        string_attribute:
          key: agent.name
          values: [meta-router, reliability, devops]
      - name: probabilistic
        type: probabilistic
        probabilistic: {sampling_percentage: 10}

  # Span metrics generation
  spanmetrics:
    metrics_exporter: prometheus
    latency_histogram_buckets: [1ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s, 30s]
    dimensions:
      - name: http.method
      - name: http.status_code
      - name: agent.name
      - name: build.id
    dimensions_cache_size: 1000
    aggregation_temporality: AGGREGATION_TEMPORALITY_CUMULATIVE

exporters:
  # Prometheus remote write
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    timeout: 30s
    headers:
      X-Scope-OrgID: masterbuilder7

  # OTLP to Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    headers:
      x-scope-orgid: masterbuilder7

  # Loki log export
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true
    default_labels_enabled:
      exporter: true
      job: true

  # Jaeger export
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

  # Zipkin export
  zipkin:
    endpoint: http://zipkin:9411/api/v2/spans
    format: proto
    default_service_name: masterbuilder7

  # Debug output
  debug:
    verbosity: detailed
    sampling_initial: 2
    sampling_thereafter: 500

  # File export for backup
  file:
    path: /var/log/otelcol/export.json
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 5
      localtime: true

extensions:
  # Health check endpoint
  health_check:
    endpoint: 0.0.0.0:13133
    path: /health
    check_collector_pipeline:
      enabled: true
      interval: 5m
      exporter_failure_threshold: 5

  # Performance profiling
  pprof:
    endpoint: 0.0.0.0:1777

  # zPages for debugging
  zpages:
    endpoint: 0.0.0.0:55679

  # Memory ballast
  memory_ballast:
    size_mib: 64

service:
  extensions: [health_check, pprof, zpages, memory_ballast]
  
  pipelines:
    # Metrics pipeline
    metrics:
      receivers: [prometheus, otlp]
      processors: [memory_limiter, resourcedetection, resource, attributes, batch]
      exporters: [prometheusremotewrite, debug]

    # Traces pipeline
    traces:
      receivers: [otlp, jaeger, zipkin]
      processors: [memory_limiter, resourcedetection, resource, tail_sampling, spanmetrics, batch]
      exporters: [otlp/tempo, jaeger, debug]

    # Logs pipeline
    logs:
      receivers: [otlp, filelog]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [loki, debug]

  # Telemetry about the collector itself
  telemetry:
    logs:
      level: info
      development: false
      sampling:
        initial: 2
        thereafter: 500
      output_paths: [stderr]
      error_output_paths: [stderr]
    metrics:
      level: detailed
      address: 0.0.0.0:8888
