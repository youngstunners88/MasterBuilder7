global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "apex_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fleet-manager'
    static_configs:
      - targets: ['fleet-manager:7778']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'agent-workers'
    static_configs:
      - targets: ['agent-worker:8080']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']