apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apex-ingress
  namespace: apex-fleet
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - apex-fleet.yourdomain.com
    secretName: apex-tls-secret
  rules:
  - host: apex-fleet.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fleet-manager
            port:
              number: 7777
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: fleet-manager
            port:
              number: 7778