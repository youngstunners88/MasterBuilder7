apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: apex-fleet
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "apex"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: DATABASE_URL
              # Extract password from URL or use separate secret
        - name: POSTGRES_DB
          value: "apex_fleet"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: apex-fleet
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: apex-fleet
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi