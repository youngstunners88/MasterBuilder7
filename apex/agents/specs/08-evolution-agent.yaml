tools:
  - name: query_pattern_database
    description: Query the pattern database for similar patterns
    parameters:
      category: string
      stack: string
      min_success_rate: number
      limit: number

  - name: store_pattern
    description: Store a new pattern in the database
    parameters:
      pattern: object
      source_build_id: string

  - name: analyze_build_history
    description: Analyze historical build data for trends
    parameters:
      date_range: object
      agent_types: [string]
      metrics: [string]

  - name: update_agent_prompt
    description: Update an agent's prompt template
    parameters:
      agent_type: string
      prompt_version: string
      new_prompt: string
      change_reason: string

  - name: create_ab_test
    description: Create a new A/B test experiment
    parameters:
      name: string
      hypothesis: string
      variants: object
      metrics: [string]
      traffic_split: object

  - name: calculate_roi
    description: Calculate ROI for a proposed change
    parameters:
      costs: object
      benefits: object
      time_horizon_months: number

  - name: synthesize_skill
    description: Create a new skill from validated patterns
    parameters:
      patterns: [string]
      skill_name: string
      category: string

  - name: forecast_performance
    description: Generate performance forecast for a project
    parameters:
      project_specs: object
      historical_matches: number

  - name: compare_stacks
    description: Compare technology stacks for migration analysis
    parameters:
      from_stack: string
      to_stack: string
      project_context: object

input_schema:
  type: object
  required: [analysis_type, context]
  properties:
    analysis_type:
      type: string
      enum: [pattern_extraction, prompt_optimization, ab_test_design, migration_analysis, roi_calculation, skill_synthesis, performance_forecasting]
      description: Type of analysis to perform

    context:
      type: object
      description: Context data for the analysis
      properties:
        session_id:
          type: string
          description: Current session identifier

        build_results:
          type: array
          description: Build results for pattern extraction
          items:
            type: object

        agent_performance:
          type: object
          description: Agent performance metrics for optimization

        current_stack:
          type: string
          description: Current technology stack for migration analysis

        proposed_changes:
          type: array
          description: List of proposed changes for ROI calculation

        project_specs:
          type: object
          description: Project specifications for forecasting

    constraints:
      type: object
      description: Constraints for the analysis
      properties:
        max_patterns:
          type: number
          default: 50
        min_success_rate:
          type: number
          default: 0.85
        time_budget_hours:
          type: number

output_schema:
  type: object
  required: [evolution_analysis, recommendations]
  properties:
    evolution_analysis:
      type: object
      description: Full analysis results following the output schema

    recommendations:
      type: array
      items:
        type: object
        properties:
          action:
            type: string
          priority:
            type: string
            enum: [high, medium, low]
          impact:
            type: string
          implementation:
            type: string

    confidence_score:
      type: number
      minimum: 0
      maximum: 1
      description: Overall confidence in the analysis

    next_review_date:
      type: string
      format: date-time
      description: When to review these recommendations

failure_modes:
  insufficient_data:
    detection: "Less than 3 historical builds available for pattern extraction"
    response: "Defer pattern extraction, collect more data, use conservative defaults"
    fallback: "CONSERVATIVE_DEFAULTS"

  conflicting_patterns:
    detection: "Multiple patterns with similar context but different implementations"
    response: "Flag for human review, prioritize higher success rate pattern"
    fallback: "HUMAN_REVIEW_REQUIRED"

  invalid_migration_target:
    detection: "Target stack incompatible with project requirements"
    response: "Document incompatibility, suggest alternative targets"
    fallback: "ALTERNATIVE_SUGGESTION"

  ab_test_underpowered:
    detection: "Sample size insufficient for statistical significance"
    response: "Extend test duration or increase traffic allocation"
    fallback: "EXTEND_TEST"

  skill_validation_failed:
    detection: "Synthesized skill fails validation on test cases"
    response: "Refine pattern extraction, add more examples, adjust parameters"
    fallback: "PATTERN_REFINEMENT"

  forecast_low_confidence:
    detection: "No similar projects found for comparison"
    response: "Provide wide confidence intervals, flag for manual estimation"
    fallback: "WIDE_CONFIDENCE_INTERVALS"

fallback_strategy:
  primary: "Use conservative patterns with extensive validation"
  secondary: "Request human review for ambiguous cases"
  tertiary: "Defer decisions until more data is collected"
