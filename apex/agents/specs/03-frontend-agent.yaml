# APEX Agent Specification: Frontend Agent
# Version: 2.0.0
# Purpose: UI/UX implementation and component generation

metadata:
  name: frontend-agent
  version: "2.0.0"
  type: core-agent
  count: 15
  cost_per_hour: 0.40
  model: kimi-k2-5
  autonomy_level: 3
  parallel_to: backend

