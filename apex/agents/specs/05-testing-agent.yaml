tools:
  - name: run_jest
    description: Run Jest test suite
    parameters:
      coverage: boolean
      watch: boolean
      
  - name: run_pytest
    description: Run pytest suite
    parameters:
      coverage: boolean
      markers: array
      
  - name: run_maestro
    description: Run Maestro E2E tests
    parameters:
      flow: string
      
  - name: security_scan
    description: Run security audit
    parameters:
      scanners: array
      
  - name: load_test
    description: Run k6 load test
    parameters:
      duration: string
      target: number

input_schema:
  type: object
  required: [frontend_path, backend_path, test_config]
  properties:
    frontend_path: string
    backend_path: string
    test_config: object
    e2e_config: object

output_schema:
  type: object
  required: [test_report, decision]
  properties:
    test_report: object
    decision: object
    artifacts: array

failure_modes:
  coverage_below_gate:
    detection: "Coverage below threshold"
    response: "Identify uncovered code, generate missing tests"
    fallback: "GENERATE_TESTS"
    
  security_critical:
    detection: "Critical security vulnerability found"
    response: "Block deployment, require immediate fix"
    fallback: "BLOCK_DEPLOYMENT"
    
  e2e_failure:
    detection: "E2E test fails"
    response: "Check if test or app issue, retry flaky tests"
    fallback: "RETRY_FLAKY"

fallback_strategy:
  primary: "Generate additional tests to improve coverage"
  secondary: "Mark known flaky tests for retry"
  tertiary: "Escalate security issues to human review"
